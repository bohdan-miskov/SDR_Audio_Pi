name: Python CI Pipeline

on:
  push:
  pull_request:

jobs:
  lint-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools

          pip-compile requirements.in
          pip-compile requirements-dev.in
          pip-sync requirements.txt requirements-dev.txt

      # --- ЖОРСТКІ ПЕРЕВІРКИ (Блокують злиття коду) ---

      - name: Check dependencies with Deptry
        run: deptry .

      - name: Ruff - Hard Errors Only
        run: ruff check . --select E9,F821 --output-format=github

      # --- SOFT FAIL (Показують зауваження, але пропускають CI) ---

      - name: Ruff - Style & Best Practices
        # --exit-zero: крок завжди успішний
        run: ruff check . --extend-ignore E9,F821 --exit-zero --output-format=github

      - name: Type check with MyPy

        run: mypy . --ignore-missing-imports
        continue-on-error: true
